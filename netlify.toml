# Beard Logistics — Netlify Configuration

[build]
  publish = "."

# Force every public route to the unified Mission Zero site.
[[redirects]]
  from = "/home"
  to = "/index.html"
  status = 301
  force = true

[[redirects]]
  from = "/about-us"
  to = "/about-us.html"
  status = 200
  force = true

